server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: gateway
  profiles:
    active: ${APPLICATION_PROFILE:dev}
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${FRONTEND_URL:http://localhost:3000}
            allowedMethods: GET, POST, PUT, DELETE, OPTIONS
            allowedHeaders: Authorization, Content-Type
            exposedHeaders: Authorization
            allowCredentials: true
      routes:
        # Stripe webhook - no rate limit, routes to membership-service
        - id: stripe-webhook
          uri: ${MEMBERSHIP_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/stripe/webhook
        # Auth routes
        - id: auth
          uri: ${AUTH_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/auth/**,/login/**,/oauth2/**
        # User routes (includes /api/blog - blog permissions moved to user-service)
        - id: user
          uri: ${USER_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/user/**
        # Blog routes - user-service (role-derived permissions)
        - id: blog
          uri: ${USER_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/blog/**
        # Membership routes
        - id: membership
          uri: ${MEMBERSHIP_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/membership/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 100
        # Newsletter routes
        - id: newsletter
          uri: ${NEWSLETTER_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/newsletter/**
        # Admin - memberships
        - id: admin-memberships
          uri: ${MEMBERSHIP_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/admin/memberships/**
        # Admin - users
        - id: admin-users
          uri: ${USER_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/admin/users/**

  data:
    redis:
      host: ${REDISHOST:${REDIS_HOST:localhost}}
      port: ${REDISPORT:${REDIS_PORT:6379}}
      password: ${REDISPASSWORD:${REDIS_PASSWORD:}}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET_TOKEN}
  jwt-cookie:
    name: ${JWT_COOKIE_NAME:JWT}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
