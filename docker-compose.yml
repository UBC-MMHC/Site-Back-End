# Local development: Gateway + Redis + Monolith + Auth + User + Membership + Newsletter
# Shared database (Phase 4): All services use the same PostgreSQL instance.
# Run: docker compose up -d redis postgres rabbitmq
# Then: monolith 8081, gateway 8080, auth 8082, user 8083, membership 8084, newsletter 8085
#
# Env for services: POSTGRES_DB=site_db POSTGRES_USER=postgres POSTGRES_PASSWORD=postgres
#                  RAILWAY_TCP_PROXY_DOMAIN=localhost RAILWAY_TCP_PROXY_PORT=5432

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: site_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d site_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
