# Local development overrides (use with profile 'local')
spring:
  datasource:
    url: jdbc:h2:mem:newsletter_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
  rabbitmq:
    host: localhost
    port: 5672
