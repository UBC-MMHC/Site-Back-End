spring:
  datasource:
    url: jdbc:h2:mem:membership_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

app.frontend-url: http://localhost:3000
stripe.secret-key: sk_test_dummy
stripe.webhook-secret: whsec_dummy
stripe.prices.ubc-student: price_test_1
stripe.prices.non-ubc-student: price_test_2
stripe.prices.non-student: price_test_3
