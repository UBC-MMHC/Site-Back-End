spring:
  config:
    import: optional:file:./local.properties

  datasource:
    # Railway: PGHOST/PGPORT/PGDATABASE; local: localhost/5432/site_db
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:site_db}?sslmode=${SSL_MODE:disable}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_auth_schema_history

  mail:
    sender_email: ${SMTP_SENDER_EMAIL:noreply@example.com}
