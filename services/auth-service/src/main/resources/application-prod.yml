spring:
  config:
    import: optional:file:./local.properties

  datasource:
    # Railway: use PGHOST, PGPORT, PGDATABASE from Postgres service reference
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=${SSL_MODE:require}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      idle-timeout: 300000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_auth_schema_history
    baseline-on-migrate: true
    baseline-version: 999

  mail:
    sender_email: ${SMTP_SENDER_EMAIL}
