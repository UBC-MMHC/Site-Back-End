spring:
  application:
    name: user-service
  profiles:
    active: ${APPLICATION_PROFILE:dev}
  datasource:
    # Railway: PGHOST/PGPORT/PGDATABASE; local: localhost/5432/site_db
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:site_db}?sslmode=${SSL_MODE:disable}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false  # Auth service owns auth schema; user-service shares site_db

app:
  internal-service-key: ${INTERNAL_SERVICE_KEY:}

server:
  forward-headers-strategy: framework
  port: ${USER_SERVICE_PORT:8083}

logging:
  level:
    org.springframework.security: INFO
